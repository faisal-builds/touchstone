# gVisor RuntimeClass. Worker pods that execute untrusted verifier code set
# runtimeClassName: gvisor (see the Helm chart). The node group must have the
# runsc/containerd-shim-runsc-v1 handler installed (provisioned via Terraform
# node bootstrap / a DaemonSet installer).
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc
scheduling:
  nodeSelector:
    touchstone.io/sandbox: "gvisor"
  tolerations:
    - key: touchstone.io/sandbox
      operator: Equal
      value: "gvisor"
      effect: NoSchedule
