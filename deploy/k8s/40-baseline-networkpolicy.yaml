# Namespace-wide default-deny baseline. The Helm chart layers explicit allow
# policies on top (DNS, intra-app, datastore egress, ingress-controller).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: baseline-default-deny
  namespace: touchstone
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
