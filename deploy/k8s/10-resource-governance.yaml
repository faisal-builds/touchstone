apiVersion: v1
kind: ResourceQuota
metadata:
  name: touchstone-quota
  namespace: touchstone
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "48"
    limits.memory: 64Gi
    pods: "200"
    count/deployments.apps: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: touchstone-limits
  namespace: touchstone
spec:
  limits:
    # Guardrail defaults so a container without explicit limits cannot starve
    # the node. The Helm chart sets explicit per-service requests/limits.
    - type: Container
      default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 128Mi
      max:
        cpu: "4"
        memory: 4Gi
