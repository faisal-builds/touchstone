{{- /*
Sensitive configuration. Three modes:
  * secrets.external=true  -> render an ExternalSecret (External Secrets Operator)
    that materializes a Secret from AWS Secrets Manager. The chart holds NO
    plaintext. This is the production default.
  * secrets.create=true    -> render a Secret from inline values (dev/bootstrap).
  * neither                -> assume a Secret named secrets.secretName already
    exists (created out-of-band).
The materialized Secret is mounted via envFrom by every workload.
*/ -}}
{{- $secretName := .Values.secrets.secretName -}}
{{- if .Values.secrets.external }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "touchstone.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.secrets.externalSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.secrets.externalSecretRemoteKey }}
{{- else if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "touchstone.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
