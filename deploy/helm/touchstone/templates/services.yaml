{{- range $name, $svc := .Values.services }}
{{- if eq $svc.kind "web" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "touchstone.fullname" $ }}-{{ $name }}
  labels:
    {{- include "touchstone.serviceLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "touchstone.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: http
      protocol: TCP
{{- end }}
{{- end }}
