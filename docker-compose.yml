# Local development stack for the Touchstone platform.
# Brings up the full dependency set (Postgres, Redis, Redpanda) plus the
# control-plane service. `make up` is the one command an engineer runs after clone.
name: touchstone

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: touchstone
      POSTGRES_PASSWORD: touchstone
      POSTGRES_DB: touchstone
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U touchstone"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:19092
      # Advertise the compose service name so clients (which bootstrap via
      # redpanda:19092) get redirected to an address they can reach on the
      # docker network. "localhost" here resolves to each client's own
      # container, causing Connection refused.
      - --advertise-kafka-addr PLAINTEXT://redpanda:19092
    ports: ["19092:19092"]
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  control-plane:
    build:
      context: .
      dockerfile: services/control-plane/Dockerfile
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      redpanda: {condition: service_started}
    environment:
      TOUCHSTONE_ENVIRONMENT: local
      TOUCHSTONE_DATABASE_URL: postgresql+asyncpg://touchstone:touchstone@postgres:5432/touchstone
      TOUCHSTONE_REDIS_URL: redis://redis:6379/0
      TOUCHSTONE_REDPANDA_BROKERS: redpanda:19092
      TOUCHSTONE_JWT_SECRET: local-dev-secret-change-me-in-prod-please
    ports: ["8000:8000"]
    # Run migrations then boot the API. Kept on a single line: a folded (>)
    # scalar preserves newlines around the more-indented continuation lines,
    # and sh treats those newlines as command separators, so the gunicorn flags
    # would silently be dropped. --worker-tmp-dir /tmp avoids a Permission denied
    # crash writing gunicorn's heartbeat file under /home/touchstone.
    command: sh -c "alembic -c /app/alembic.ini upgrade head && gunicorn touchstone_control.main:app --worker-class uvicorn.workers.UvicornWorker --workers 4 --bind 0.0.0.0:8000 --worker-tmp-dir /tmp --access-logfile -"
    # The slim image has no curl/wget; probe with the interpreter. start_period
    # covers alembic migrations running before gunicorn binds.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 60s

  verification-engine:
    build:
      context: .
      dockerfile: services/verification-engine/Dockerfile
    depends_on:
      postgres: {condition: service_healthy}
      redpanda: {condition: service_started}
      control-plane: {condition: service_healthy}
    environment:
      TOUCHSTONE_VERIFY_ENVIRONMENT: local
      TOUCHSTONE_VERIFY_DATABASE_URL: postgresql+asyncpg://touchstone:touchstone@postgres:5432/touchstone
      TOUCHSTONE_VERIFY_REDPANDA_BROKERS: redpanda:19092
      TOUCHSTONE_VERIFY_ARTIFACT_STORE_URI: file:///artifacts
    volumes:
      - ./.artifacts:/artifacts
    # The sandbox uses unshare for network isolation; that needs the capability.
    cap_add: ["SYS_ADMIN"]

  risk-engine:
    build:
      context: .
      dockerfile: services/risk-engine/Dockerfile
    depends_on:
      postgres: {condition: service_healthy}
      redpanda: {condition: service_started}
      control-plane: {condition: service_healthy}
    environment:
      TOUCHSTONE_RISK_ENVIRONMENT: local
      TOUCHSTONE_RISK_DATABASE_URL: postgresql+asyncpg://touchstone:touchstone@postgres:5432/touchstone
      TOUCHSTONE_RISK_REDPANDA_BROKERS: redpanda:19092

  audit-engine:
    build:
      context: .
      dockerfile: services/audit-engine/Dockerfile
    depends_on:
      postgres: {condition: service_healthy}
      redpanda: {condition: service_started}
      control-plane: {condition: service_healthy}
    environment:
      TOUCHSTONE_AUDIT_ENVIRONMENT: local
      TOUCHSTONE_AUDIT_DATABASE_URL: postgresql+asyncpg://touchstone:touchstone@postgres:5432/touchstone
      TOUCHSTONE_AUDIT_REDPANDA_BROKERS: redpanda:19092

  reward-hacking-detector:
    build:
      context: .
      dockerfile: services/reward-hacking-detector/Dockerfile
    depends_on:
      postgres: {condition: service_healthy}
      redpanda: {condition: service_started}
      control-plane: {condition: service_healthy}
    environment:
      TOUCHSTONE_RHD_ENVIRONMENT: local
      TOUCHSTONE_RHD_DATABASE_URL: postgresql+asyncpg://touchstone:touchstone@postgres:5432/touchstone
      TOUCHSTONE_RHD_REDPANDA_BROKERS: redpanda:19092
      # Must match the control-plane so user JWTs (the dashboard's credential) verify.
      TOUCHSTONE_RHD_JWT_SECRET: local-dev-secret-change-me-in-prod-please
    ports:
      - "8030:8030"
    # Code verifiers execute in the engine sandbox, which uses unshare.
    cap_add: ["SYS_ADMIN"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8030/healthz', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  reward-hacking-detector-worker:
    build:
      context: .
      dockerfile: services/reward-hacking-detector/Dockerfile
    command: ["python", "-m", "touchstone_rhd.worker_main"]
    depends_on:
      postgres: {condition: service_healthy}
      redpanda: {condition: service_started}
      reward-hacking-detector: {condition: service_healthy}
    environment:
      TOUCHSTONE_RHD_ENVIRONMENT: local
      TOUCHSTONE_RHD_DATABASE_URL: postgresql+asyncpg://touchstone:touchstone@postgres:5432/touchstone
      TOUCHSTONE_RHD_REDPANDA_BROKERS: redpanda:19092
      TOUCHSTONE_RHD_JWT_SECRET: local-dev-secret-change-me-in-prod-please
      TOUCHSTONE_RHD_AUTO_EVALUATE_ON_REGISTER: "true"
    cap_add: ["SYS_ADMIN"]
    # This reuses the RHD image (which has an HTTP HEALTHCHECK) but runs the
    # headless worker with no HTTP port, so the inherited probe would always
    # fail. Disable it — the worker's liveness is the process + restart policy.
    healthcheck:
      disable: true

  # Inline Verification Plane — the inline/critical-path gateway (ADR-015). The
  # dashboard's BFF proxies to it (IVP_URL). Stateless: reads no DB, validates
  # API keys via the control-plane and shares its JWT secret.
  ivp:
    build:
      context: .
      dockerfile: services/ivp/Dockerfile
    depends_on:
      redpanda: {condition: service_started}
      control-plane: {condition: service_healthy}
    environment:
      TOUCHSTONE_IVP_ENVIRONMENT: local
      TOUCHSTONE_IVP_CONTROL_PLANE_URL: http://control-plane:8000
      TOUCHSTONE_IVP_REDPANDA_BROKERS: redpanda:19092
      # Must match the control-plane so user JWTs + minted service tokens verify.
      TOUCHSTONE_IVP_JWT_SECRET: local-dev-secret-change-me-in-prod-please
      # LOCAL DEV ONLY. The plane fails closed on the insecure subprocess sandbox;
      # this compose stack runs it (no gVisor/Firecracker here), so opt in
      # explicitly. Production selects a hardened backend and never sets this.
      TOUCHSTONE_ALLOW_INSECURE_SANDBOX: "1"
    ports:
      - "8050:8050"
    # The fast tier executes code verifiers in the engine sandbox (unshare).
    cap_add: ["SYS_ADMIN"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8050/healthz', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    depends_on:
      control-plane: {condition: service_healthy}
      reward-hacking-detector: {condition: service_healthy}
      ivp: {condition: service_healthy}
    environment:
      # The dashboard's BFF proxies to these (server-side only).
      CONTROL_PLANE_URL: http://control-plane:8000
      RHD_URL: http://reward-hacking-detector:8030
      IVP_URL: http://ivp:8050
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

volumes:
  pgdata:
