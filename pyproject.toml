# Root workspace manifest (uv workspace, ADR-001).
# Each service/lib is an independent installable package; this file ties them
# together for tooling and declares shared dev dependencies.
[tool.uv.workspace]
members = ["services/*", "libs/*", "sdks/python"]

[tool.uv.sources]
touchstone-events = { workspace = true }

[tool.ruff]
line-length = 95
target-version = "py312"
extend-exclude = [".venv", "**/migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "ASYNC", "S", "C4", "PT"]
ignore = ["S101"]
