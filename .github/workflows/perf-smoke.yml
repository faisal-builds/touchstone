name: perf-smoke

# A lightweight performance smoke: it boots the control-plane API against
# ephemeral Postgres/Redis and runs the Locust `smoke` profile (3 users, ~20s)
# to catch gross regressions and broken hot-path endpoints on every change.
#
# It is deliberately cheap and non-flaky: no broker/worker is started, so
# end-to-end verification completion is NOT enforced (the smoke profile sets
# expect_completion=false). Latency gates are relaxed for shared CI runners while
# the error-rate gate stays strict — broken wiring fails the job, slow-but-working
# runners do not.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: perf-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: touchstone
          POSTGRES_PASSWORD: touchstone
          POSTGRES_DB: touchstone
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U touchstone"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      TOUCHSTONE_ENVIRONMENT: ci
      TOUCHSTONE_DATABASE_URL: postgresql+asyncpg://touchstone:touchstone@localhost:5432/touchstone
      TOUCHSTONE_AUDIT_DATABASE_URL: postgresql+asyncpg://touchstone:touchstone@localhost:5432/touchstone
      TOUCHSTONE_REDIS_URL: redis://localhost:6379/0
      TOUCHSTONE_JWT_SECRET: ci-secret-key-at-least-32-bytes-long!!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e libs/touchstone-events
          pip install -e services/control-plane
          pip install -e services/audit-engine
          pip install -e load-tests

      - name: Migrate control-plane
        working-directory: services/control-plane
        run: PYTHONPATH=src alembic upgrade head

      - name: Create audit table
        run: |
          python - <<'PY'
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          from touchstone_audit.repository import create_schema
          async def main():
              engine = create_async_engine(
                  "postgresql+asyncpg://touchstone:touchstone@localhost:5432/touchstone"
              )
              await create_schema(engine)
              await engine.dispose()
          asyncio.run(main())
          PY

      - name: Start control-plane API
        run: |
          PYTHONPATH=services/control-plane/src nohup uvicorn touchstone_control.main:app \
            --host 127.0.0.1 --port 8000 --log-level warning > /tmp/cp.log 2>&1 &
          for i in $(seq 1 30); do
            sleep 1
            if curl -fsS http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
              echo "control-plane healthy after ${i}s"; exit 0
            fi
          done
          echo "control-plane failed to start"; cat /tmp/cp.log; exit 1

      - name: Run smoke load test
        working-directory: load-tests
        env:
          TOUCHSTONE_LOAD_PROFILE: smoke
          TOUCHSTONE_LOAD_HOST: http://127.0.0.1:8000
          # Relax latency gates for shared CI runners; keep error-rate strict.
          TOUCHSTONE_LOAD_MAX_P95_MS: "4000"
          TOUCHSTONE_LOAD_MAX_P99_MS: "8000"
          TOUCHSTONE_LOAD_MAX_ERROR_RATE: "0.02"
        run: bash run.sh smoke

      - name: Control-plane log (on failure)
        if: failure()
        run: cat /tmp/cp.log || true
