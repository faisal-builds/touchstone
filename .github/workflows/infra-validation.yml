name: infra-validation

# Validates the deploy layer that cannot be exercised by unit tests: the Helm
# chart, raw Kubernetes manifests, and Terraform. Runs on any change under
# deploy/ (and can be invoked manually).
on:
  pull_request:
    paths:
      - "deploy/**"
      - ".github/workflows/infra-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: helm lint
        run: helm lint deploy/helm/touchstone -f deploy/helm/touchstone/values-production.yaml
      - name: helm template
        # Render into the workspace, not /tmp: the kubeconform step below runs as
        # a Docker action that only mounts $GITHUB_WORKSPACE (/github/workspace),
        # so a /tmp path on the runner is invisible inside that container.
        run: |
          helm template touchstone deploy/helm/touchstone \
            -n touchstone -f deploy/helm/touchstone/values-production.yaml > rendered.yaml
          test -s rendered.yaml
      - name: Validate rendered manifests (kubeconform)
        uses: docker://ghcr.io/yannh/kubeconform:v0.8.0
        with:
          # NOTE: do not single-quote the schema-location URL. The action passes
          # `args` as one string and word-splits it, so the quotes would be taken
          # literally into the URL (parse error on the CRD catalog template).
          args: >-
            -strict -ignore-missing-schemas
            -schema-location default
            -schema-location https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json
            rendered.yaml

  k8s-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate raw manifests (kubeconform)
        uses: docker://ghcr.io/yannh/kubeconform:v0.8.0
        with:
          args: "-strict -ignore-missing-schemas -summary deploy/k8s/"

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"
      - name: terraform fmt
        run: terraform fmt -check -recursive
      - name: terraform init (no backend)
        run: terraform init -backend=false
      - name: terraform validate
        run: terraform validate
      - name: tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          # Pin the linter so an upstream tflint release can't change the rules
          # under us and break CI without a code change. Verified at this version.
          tflint_version: v0.63.1
      - run: tflint --recursive

  policy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov (IaC security scan)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: deploy
          quiet: true
          soft_fail: true
