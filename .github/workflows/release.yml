name: release

# Production release pipeline. Triggered by a semver tag (e.g. v1.0.0):
#   1. build + push every service image (and the sandbox image) to GHCR
#   2. package + push the Helm chart as an OCI artifact
#   3. deploy to the production cluster (gated by a GitHub Environment approval)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g. 1.0.0)"
        required: true

permissions:
  contents: read
  packages: write
  id-token: write   # for AWS OIDC in the deploy job

env:
  REGISTRY: ghcr.io

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

  publish-images:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: control-plane
            file: services/control-plane/Dockerfile
            context: .
          - service: verification-engine
            file: services/verification-engine/Dockerfile
            context: .
          - service: risk-engine
            file: services/risk-engine/Dockerfile
            context: .
          - service: audit-engine
            file: services/audit-engine/Dockerfile
            context: .
          - service: reward-hacking-detector
            file: services/reward-hacking-detector/Dockerfile
            context: .
          - service: web
            file: apps/web/Dockerfile
            context: apps/web
          - service: sandbox
            file: deploy/docker/sandbox.Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}:latest
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-chart:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Lint
        run: helm lint deploy/helm/touchstone -f deploy/helm/touchstone/values-production.yaml
      - name: Package
        run: |
          helm package deploy/helm/touchstone \
            --version "${{ needs.version.outputs.version }}" \
            --app-version "${{ needs.version.outputs.version }}"
      - name: Push (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            -u ${{ github.actor }} --password-stdin
          helm push "touchstone-${{ needs.version.outputs.version }}.tgz" \
            "oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts"

  deploy:
    # DESIGN — not yet provisioned. This job is intentionally a PLACEHOLDER: it
    # performs NO live AWS or Kubernetes actions. The real OIDC auth + helm
    # upgrade are kept commented out below and will be enabled only once the EKS
    # cluster is provisioned and this environment's OIDC trust + secrets exist.
    # The `environment: production` gate already requires a reviewer to approve
    # before this job can run.
    needs: [version, publish-images, publish-chart]
    runs-on: ubuntu-latest
    environment: production   # requires a reviewer approval before it runs
    steps:
      - uses: actions/checkout@v4
      - name: Deploy (placeholder — no live cloud actions)
        run: |
          echo "DESIGN placeholder: no live deploy is performed in this pipeline."
          echo "Would deploy version '${{ needs.version.outputs.version }}' to the production cluster."
          echo
          echo "To enable a real deploy, provision EKS + configure this environment's"
          echo "OIDC trust and secrets, then re-enable the commented steps below:"
          echo "  - aws-actions/configure-aws-credentials  (OIDC, no static keys)"
          echo "  - aws eks update-kubeconfig --name <cluster>"
          echo "  - helm upgrade --install touchstone oci://.../charts/touchstone --atomic --wait"
          echo "  - kubectl -n touchstone rollout status deploy/touchstone-control-plane"
      # --- Real deploy steps (DISABLED until the cluster is provisioned) -------
