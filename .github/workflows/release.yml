      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      #     aws-region: ${{ secrets.AWS_REGION }}
      # - name: Update kubeconfig
      #   run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }}
