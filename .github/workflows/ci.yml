name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/control-plane

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: touchstone
          POSTGRES_PASSWORD: touchstone
          POSTGRES_DB: touchstone
          # Tests connect with a passwordless URL (touchstone@host); trust auth
          # lets those connections in while migrations still use the full DSN.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U touchstone"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      TOUCHSTONE_ENVIRONMENT: ci
      TOUCHSTONE_DATABASE_URL: postgresql+asyncpg://touchstone:touchstone@localhost:5432/touchstone
      TOUCHSTONE_REDIS_URL: redis://localhost:6379/0
      TOUCHSTONE_JWT_SECRET: ci-secret-key-at-least-32-bytes-long!!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../libs/touchstone-events
          # Tests create the audit-engine-owned audit_records schema in the
          # shared test DB via touchstone_audit.repository.create_schema.
          pip install -e ../audit-engine
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src

      - name: Type check
        run: mypy src

      - name: Migrate
        run: PYTHONPATH=src alembic upgrade head

      - name: Test
        run: PYTHONPATH=src pytest tests/ -q --cov=touchstone_control --cov-report=term-missing --cov-report=xml --junitxml=reports/junit.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-reports
          path: |
            services/control-plane/reports/junit.xml
            services/control-plane/coverage.xml
          if-no-files-found: ignore

  verification-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/verification-engine
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: touchstone
          POSTGRES_PASSWORD: touchstone
          POSTGRES_DB: touchstone
          # Tests connect with a passwordless URL (touchstone@host); trust auth
          # lets those connections in while migrations still use the full DSN.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U touchstone"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      TOUCHSTONE_VERIFY_ENVIRONMENT: ci
      TOUCHSTONE_VERIFY_DATABASE_URL: postgresql+asyncpg://touchstone:touchstone@localhost:5432/touchstone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../libs/touchstone-events
          pip install -e ".[dev]"
      - name: Migrate (control-plane owns the schema)
        run: |
          pip install -e ../control-plane
          cd ../control-plane && PYTHONPATH=src alembic upgrade head
      - name: Lint
        run: ruff check src
      # ubuntu-24.04 restricts unprivileged user namespaces via AppArmor, which
      # breaks the sandbox's `unshare --map-root-user`. Re-enable them for tests.
      - name: Enable unprivileged user namespaces (sandbox)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Test
        run: PYTHONPATH=src pytest tests/ -q --junitxml=reports/junit.xml
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-engine-reports
          path: services/verification-engine/reports/junit.xml
          if-no-files-found: ignore

  risk-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/risk-engine
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: touchstone
          POSTGRES_PASSWORD: touchstone
          POSTGRES_DB: touchstone
          # Tests connect with a passwordless URL (touchstone@host); trust auth
          # lets those connections in while migrations still use the full DSN.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U touchstone"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      TOUCHSTONE_RISK_ENVIRONMENT: ci
      TOUCHSTONE_RISK_DATABASE_URL: postgresql+asyncpg://touchstone:touchstone@localhost:5432/touchstone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../libs/touchstone-events
          pip install -e ".[dev]"
      - name: Migrate (control-plane owns the schema)
        run: |
          pip install -e ../control-plane
          cd ../control-plane && PYTHONPATH=src alembic upgrade head
      - name: Lint
        run: ruff check src
      - name: Test
        run: PYTHONPATH=src pytest tests/ -q --junitxml=reports/junit.xml
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risk-engine-reports
          path: services/risk-engine/reports/junit.xml
          if-no-files-found: ignore

  audit-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/audit-engine
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: touchstone
          POSTGRES_PASSWORD: touchstone
          POSTGRES_DB: touchstone
          # Tests connect with a passwordless URL (touchstone@host); trust auth
          # lets those connections in while migrations still use the full DSN.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U touchstone"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      TOUCHSTONE_AUDIT_ENVIRONMENT: ci
      TOUCHSTONE_AUDIT_DATABASE_URL: postgresql+asyncpg://touchstone:touchstone@localhost:5432/touchstone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../libs/touchstone-events
          pip install -e ".[dev]"
      - name: Migrate (control-plane owns the schema)
        run: |
          pip install -e ../control-plane
          cd ../control-plane && PYTHONPATH=src alembic upgrade head
      - name: Lint
        run: ruff check src
      - name: Test
        run: PYTHONPATH=src pytest tests/ -q --junitxml=reports/junit.xml
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-engine-reports
          path: services/audit-engine/reports/junit.xml
          if-no-files-found: ignore

  reward-hacking-detector:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/reward-hacking-detector
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: touchstone
          POSTGRES_PASSWORD: touchstone
          POSTGRES_DB: touchstone
          # Tests connect with a passwordless URL (touchstone@host); trust auth
          # lets those connections in while migrations still use the full DSN.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U touchstone"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      TOUCHSTONE_RHD_ENVIRONMENT: ci
      TOUCHSTONE_RHD_DATABASE_URL: postgresql+asyncpg://touchstone:touchstone@localhost:5432/touchstone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../libs/touchstone-events
          pip install -e ../verification-engine
          pip install -e ".[dev]"
      - name: Migrate (control-plane owns the schema)
        run: |
          pip install -e ../control-plane
          cd ../control-plane && PYTHONPATH=src alembic upgrade head
      - name: Lint
        run: ruff check src tests
      # Attacks execute through the verification-engine sandbox (unshare
      # --map-root-user), which ubuntu-24.04 blocks via AppArmor. Re-enable.
      - name: Enable unprivileged user namespaces (sandbox)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Test
        run: PYTHONPATH=src pytest tests/ -q --junitxml=reports/junit.xml
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reward-hacking-detector-reports
          path: services/reward-hacking-detector/reports/junit.xml
          if-no-files-found: ignore

  ivp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ivp
    env:
      TOUCHSTONE_IVP_ENVIRONMENT: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../libs/touchstone-events
          pip install -e ../../libs/touchstone-fleet
          pip install -e ../verification-engine
          pip install -e ../risk-engine
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      # ubuntu-24.04 restricts unprivileged user namespaces via AppArmor, which
      # breaks the sandbox's `unshare --map-root-user`. Re-enable them for tests.
      - name: Enable unprivileged user namespaces (sandbox)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Test
        # The IVP has no datastore; tests run the real sandbox in-process.
        run: PYTHONPATH=src pytest tests/ -q --junitxml=reports/junit.xml
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ivp-reports
          path: services/ivp/reports/junit.xml
          if-no-files-found: ignore

  python-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: touchstone
          POSTGRES_PASSWORD: touchstone
          POSTGRES_DB: touchstone
          # The e2e boots the control-plane in-process against this DB; tests
          # connect passwordless (touchstone@host) so trust auth lets them in.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U touchstone"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      TOUCHSTONE_ENVIRONMENT: ci
      TOUCHSTONE_JWT_SECRET: ci-secret-key-at-least-32-bytes-long!!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../libs/touchstone-events
          # The e2e test runs the real control-plane app over HTTP via the SDK.
          pip install -e ../../services/control-plane
          pip install -e ".[dev]"
      - name: Migrate (control-plane schema for the e2e)
        run: cd ../../services/control-plane && PYTHONPATH=src alembic upgrade head
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: PYTHONPATH=src pytest tests/ -q --junitxml=reports/junit.xml
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-reports
          path: sdks/python/reports/junit.xml
          if-no-files-found: ignore

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Upload web build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-standalone-build
          path: apps/web/.next/standalone
          if-no-files-found: ignore

  typescript-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Build (ESM + CJS + types)
        run: npm run build
      - name: Upload SDK build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk-dist
          path: sdks/typescript/dist
          if-no-files-found: ignore

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose config
        run: |
          docker compose config --quiet
          echo "docker compose config OK"
      - name: List resolved services
        run: docker compose config --services

  docker-build:
    runs-on: ubuntu-latest
    needs: [control-plane, verification-engine, risk-engine, audit-engine, reward-hacking-detector, ivp, python-sdk, web]
    strategy:
      matrix:
        include:
          - service: control-plane
            file: services/control-plane/Dockerfile
            context: .
          - service: verification-engine
            file: services/verification-engine/Dockerfile
            context: .
          - service: risk-engine
            file: services/risk-engine/Dockerfile
            context: .
          - service: audit-engine
            file: services/audit-engine/Dockerfile
            context: .
          - service: reward-hacking-detector
            file: services/reward-hacking-detector/Dockerfile
            context: .
          - service: ivp
            file: services/ivp/Dockerfile
            context: .
          - service: web
            file: apps/web/Dockerfile
            context: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          tags: touchstone/${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
